<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elite Dacha — Admin Panel</title>
  <link rel="stylesheet" href="admin.css" /><link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.4.2/css/all.css">

</head>
<body>

  <div class="ap">

    <!-- TOP BAR -->
    <div class="ap-topbar">
      <span class="ap-title">🏡 Elite Dacha — Admin Panel</span>
      <div> <a class="ap-btn primary" style="text-decoration: none;" href="./index.html"><i class="fa-light fa-house"></i> Bosh sahifa</a>
      <button class="ap-btn primary" id="addBtn">+ Bron qo'shish</button></div>
     
    </div>

    <!-- NOTE -->
    <div class="ap-note">
      Bronlar brauzer xotirasida saqlanadi. Har bir yangi bron avtomatik qo'shiladi.
    </div>

    <!-- STATS -->
    <div class="ap-stats">
      <div class="ap-stat">
        <div class="ap-stat-n" id="s-total">0</div>
        <div class="ap-stat-l">Jami bronlar</div>
      </div>
      <div class="ap-stat">
        <div class="ap-stat-n blue" id="s-new">0</div>
        <div class="ap-stat-l">Yangi / kutilayotgan</div>
      </div>
      <div class="ap-stat">
        <div class="ap-stat-n" id="s-guests">0</div>
        <div class="ap-stat-l">Jami mehmonlar</div>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="ap-filters">
      <input class="ap-search" id="search" placeholder="Ism yoki telefon bo'yicha qidirish..." />
      <select class="ap-select" id="filterStatus">
        <option value="">Barcha statuslar</option>
        <option value="new">Yangi</option>
        <option value="confirmed">Tasdiqlangan</option>
        <option value="cancelled">Bekor qilingan</option>
      </select>
      <button class="ap-btn" id="exportBtn">CSV yuklash</button>
      <button class="ap-btn danger" id="clearBtn">Hammasini o'chirish</button>
    </div>

    <!-- TABLE -->
    <div class="ap-table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Ism</th>
            <th>Telefon</th>
            <th>Sana</th>
            <th>Mehmonlar</th>
            <th>Status</th>
            <th>Qabul qilingan</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div id="empty" class="ap-empty">Bronlar topilmadi.</div>
    </div>

  </div>

  <!-- MODAL -->
  <div class="ap-modal-bg" id="modal">
    <div class="ap-modal">
      <h3 id="modal-title">Bron qo'shish</h3>

      <div class="ap-field">
        <label>Ism</label>
        <input id="m-name" placeholder="To'liq ism" />
      </div>
      <div class="ap-field">
        <label>Telefon</label>
        <input id="m-phone" placeholder="+998 __ ___ __ __" />
      </div>
      <div class="ap-field">
        <label>Sana</label>
        <input id="m-date" type="date" />
      </div>
      <div class="ap-field">
        <label>Mehmonlar soni</label>
        <input id="m-guests" type="number" min="1" max="75" placeholder="1–75" />
      </div>
      <div class="ap-field">
        <label>Status</label>
        <select id="m-status">
          <option value="new">Yangi</option>
          <option value="confirmed">Tasdiqlangan</option>
          <option value="cancelled">Bekor qilingan</option>
        </select>
      </div>

      <div class="ap-modal-footer">
        <button class="ap-btn" id="cancelModal">Bekor qilish</button>
        <button class="ap-btn primary" id="saveModal">Saqlash</button>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
